<!DOCTYPE html>
<html>
<head>
  <title>Check-In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      padding: 2em;
      text-align: center;
    }
    .status {
      margin-top: 2em;
      font-size: 1.2em;
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <h2>📍 Getting your location...</h2>
  <p id="status">Please allow location access.</p>

  <script>
    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        const params = new URLSearchParams(window.location.search);
        params.set("lat", lat);
        params.set("lon", lon);

        const url = `https://script.google.com/macros/s/AKfycbyT4s1gELfKfKVvZDt-LrIakXs7AqiAG5JToYJdBhymJzQRpOrL69rFrVwsYaL8J1OPrg/exec?${params.toString()}`;
        window.top.location.href = url;
      },
      (err) => {
        console.error("❌ Geolocation error:", err);
        document.getElementById("status").innerText = "❌ Location access denied.";
      }
    );
  </script>
</body>
</html>
